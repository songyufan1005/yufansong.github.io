{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Editorial typography: EB Garamond (display serif) + Inter (text sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap"/>

<!-- Custom theme overrides (Alex Webb-inspired editorial palette) -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/custom.css"/>

<!-- Palette toggle: read saved preference synchronously to avoid a flash of the wrong palette -->
<script>
  try {
    var p = localStorage.getItem('aw-palette');
    if (p === 'ink') document.documentElement.setAttribute('data-palette', 'ink');
  } catch (e) {}
</script>
<script defer src="{{ base_path }}/assets/js/palette-toggle.js"></script>

<!-- Email obfuscation: assemble mailto address at runtime so scrapers reading source see only split parts -->
<script>
  window.addEventListener('DOMContentLoaded', function () {
    var nodes = document.querySelectorAll('.email-obf');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      var addr = el.getAttribute('data-u') + String.fromCharCode(64) + el.getAttribute('data-d');
      var a = document.createElement('a');
      a.href = 'mailto:' + addr;
      a.textContent = addr;
      el.appendChild(a);
    }
  });
</script>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->
